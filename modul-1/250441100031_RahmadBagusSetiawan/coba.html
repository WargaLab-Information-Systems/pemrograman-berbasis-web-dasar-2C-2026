<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<form action="">

<p style="font-weight:bold; text-align:center;">
Form Pengisian Data Diri
</p>

<!-- Nama -->
<p>Nama Lengkap</p>
<input type="text" placeholder="Masukkan nama lengkap">

<!-- Password -->
<p>Password</p>
<input type="password" placeholder="Masukkan password">

<!-- Jenis Kelamin -->
<p>Jenis Kelamin</p>
<input type="radio" name="jk"> Laki-laki
<input type="radio" name="jk"> Perempuan

<!-- Email -->
<p>Email</p>
<input type="email" placeholder="cth: nama@gmail.com">

<!-- Nomor Telepon -->
<p>Nomor Telepon</p>
<input type="tel" placeholder="cth: 08123456789">

<!-- Tanggal Lahir -->
<p>Tanggal Lahir</p>
<input type="date">

<!-- Website -->
<p>Website</p>
<input type="url" placeholder="cth: https://website.com">

<!-- Upload File -->
<p>Upload Foto</p>
<input type="file">

<!-- Pilih Warna -->
<p>Pilih Warna Favorit</p>
<input type="color">

<!-- Range -->
<p>Tingkat Kemampuan (1-100)</p>
<input type="range">

<!-- Checkbox -->
<p>
<input type="checkbox"> Data yang saya isi sudah benar
</p>

<!-- Tombol -->
<input type="reset" value="Reset">
<input type="submit" value="Kirim">

</form>

<h2 id="bagian1">bagian 1</h2>
</body>
</html>
